<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1, viewport-fit=cover">
  <title>Мобиль</title>
  <style>
    :root {
      --bg: #101010;
      --accent: #ff4d06;
      --text: #ffffff;
      --canvas: 402px;
      --canvas-height: 730px;
      --outer-pad: 16px;
      --card-radius: 15px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      width: 100%;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(100%, var(--canvas));
      height: var(--canvas-height);
      min-height: var(--canvas-height);
      padding: 16px var(--outer-pad) 48px;
      background: var(--bg);
      overflow: hidden;
    }

    .mark {
      width: 43px;
      height: 37px;
      display: block;
      margin-bottom: 45px;
    }

    .title {
      width: 369px;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 0 90px;
    }

    .card {
      width: 100%;
      min-height: 244px;
      background: var(--accent);
      border-radius: var(--card-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card__formula {
      text-align: center;
      font-size: clamp(34px, 8vw, 50px);
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: -0.6px;
      max-width: 100%;
      text-wrap: balance;
    }

    .card__formula--compact {
      font-size: clamp(28px, 6.8vw, 42px);
      line-height: 1.16;
      letter-spacing: -0.3px;
    }

    @media (max-width: 380px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .title {
        margin-bottom: 72px;
      }

      .card {
        min-height: 220px;
      }

      .card__formula {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <img
      class="mark"
      src="./logo-mark.png"
      srcset="./logo-mark@2x.png 2x, ./logo-mark@3x.png 3x"
      width="43"
      height="37"
      alt=""
      aria-hidden="true"
    >

    <img
      class="title"
      src="./logo-title.png"
      srcset="./logo-title@2x.png 2x, ./logo-title@3x.png 3x"
      width="370"
      height="64"
      alt="Мобиль"
    >

    <section aria-label="Задание">
      <article class="card">
        <div class="card__formula" id="formula">4x + 3 = 19</div>
      </article>
    </section>
  </main>

    const formulaNode = document.getElementById("formula");
    const params = new URLSearchParams(window.location.search);
    const requestedId = Number.parseInt(params.get("id") || "", 10);
    const hasExplicitId = Number.isInteger(requestedId) && requestedId >= 1 && requestedId <= equations.length;
    const randomId = Math.floor(Math.random() * equations.length) + 1;
    const selectedId = hasExplicitId ? requestedId : randomId;
    const selectedEquation = equations[selectedId - 1];

    formulaNode.textContent = selectedEquation;
    formulaNode.classList.toggle("card__formula--compact", selectedEquation.length > 16);
    document.title = "Мобиль";

</body>
</html>
